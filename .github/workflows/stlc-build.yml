name: stlc build

on:
  push:
    branches: [main]
    paths:
      - 'stainless/openapi.yml'
      - 'stainless/stainless.yml'
      - '.github/workflows/stlc-build.yml'
  workflow_dispatch:
    inputs:
      bootstrap:
        description: "One-time: seal generated output as origin/main (for fresh, empty SDK repos)"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: stlc-build-main
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Prevent checkout from writing an http.extraheader credential for the
          # default GITHUB_TOKEN. That header is sent on every git HTTPS request
          # from the repo dir and overrides the STLC_TOKEN embedded in our install
          # URLs, causing "Repository not found" (404) for the private SDK repos.
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Configure git auth
        env:
          STLC_TOKEN: ${{ secrets.STLC_TOKEN }}
        run: |
          git config --global --add url."https://x-access-token:${STLC_TOKEN}@github.com/karimsamir897/".insteadOf "https://github.com/stainless/"
          git config --global --add url."https://x-access-token:${STLC_TOKEN}@github.com/karimsamir897/".insteadOf "ssh://git@github.com/stainless/"
          git config --global --add url."https://x-access-token:${STLC_TOKEN}@github.com/karimsamir897/".insteadOf "git@github.com:stainless/"
          # Inject the token into all other github.com URLs (e.g. the SDK output
          # repos at github.com/karimsamir897/...). The stainless/ rewrites above
          # still win via longest-prefix match; everything else just gets the token.
          git config --global --add url."https://x-access-token:${STLC_TOKEN}@github.com/".insteadOf "https://github.com/"
          git config --global user.name "stlc-bot"
          git config --global user.email "stlc-bot@users.noreply.github.com"

      - name: Install stlc (deps first to avoid transitive fetch)
        env:
          STLC_TOKEN: ${{ secrets.STLC_TOKEN }}
        run: |
          npm install -g \
            "git+https://x-access-token:${STLC_TOKEN}@github.com/karimsamir897/stlc-typescript.git" \
            "git+https://x-access-token:${STLC_TOKEN}@github.com/karimsamir897/stlc-mcp.git"
          npm install -g \
            "git+https://x-access-token:${STLC_TOKEN}@github.com/karimsamir897/stlc.git"

      - name: Verify stlc
        run: stlc version

      - name: Build and push
        if: ${{ ! inputs.bootstrap }}
        run: stlc build --branch main --push

      - name: Bootstrap — seal generated output as origin/main
        if: ${{ inputs.bootstrap }}
        env:
          STLC_TOKEN: ${{ secrets.STLC_TOKEN }}
        run: |
          # One-time bootstrap for fresh SDK repos that still carry a non-stlc
          # "initial commit". Generate the SDK (integration fails at the origin-
          # alignment guard — expected, since origin's tip isn't an stlc commit
          # yet), then point origin/main at the generated gen-head so future
          # builds recognize the baseline. After this, the normal build path works.
          stlc build --branch main || echo "build exited non-zero (expected at the alignment guard)"

          # Locate the SDK clone that holds the generated gen-head ref.
          clone=""
          while IFS= read -r gitpath; do
            d="$(dirname "$gitpath")"
            if git -C "$d" show-ref --verify --quiet refs/stainless/gen-head 2>/dev/null; then
              clone="$d"; break
            fi
          done < <(find "$PWD" -name .git 2>/dev/null)

          if [ -z "$clone" ]; then
            echo "ERROR: could not find a clone containing refs/stainless/gen-head"; exit 1
          fi
          echo "Sealing gen-head as main in: $clone"
          git -C "$clone" show-ref refs/stainless/gen-head
          git -C "$clone" update-ref refs/heads/main refs/stainless/gen-head
          git -C "$clone" push --force origin main
          echo "Done — origin/main now points at the recognized gen-head."