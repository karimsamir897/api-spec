name: stlc build

on:
  push:
    branches: [main]
    paths:
      - 'stainless/openapi.yml'
      - 'stainless/stainless.yml'
      - '.github/workflows/stlc-build.yml'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: stlc-build-main
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Prevent checkout from writing an http.extraheader credential for the
          # default GITHUB_TOKEN. That header is sent on every git HTTPS request
          # from the repo dir and overrides the STLC_TOKEN embedded in our install
          # URLs, causing "Repository not found" (404) for the private SDK repos.
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Configure git auth
        env:
          STLC_TOKEN: ${{ secrets.STLC_TOKEN }}
        run: |
          git config --global --add url."https://x-access-token:${STLC_TOKEN}@github.com/karimsamir897/".insteadOf "https://github.com/stainless/"
          git config --global --add url."https://x-access-token:${STLC_TOKEN}@github.com/karimsamir897/".insteadOf "ssh://git@github.com/stainless/"
          git config --global --add url."https://x-access-token:${STLC_TOKEN}@github.com/karimsamir897/".insteadOf "git@github.com:stainless/"
          # Inject the token into all other github.com URLs (e.g. the SDK output
          # repos at github.com/karimsamir897/...). The stainless/ rewrites above
          # still win via longest-prefix match; everything else just gets the token.
          git config --global --add url."https://x-access-token:${STLC_TOKEN}@github.com/".insteadOf "https://github.com/"
          git config --global user.name "stlc-bot"
          git config --global user.email "stlc-bot@users.noreply.github.com"

      - name: Install stlc (deps first to avoid transitive fetch)
        env:
          STLC_TOKEN: ${{ secrets.STLC_TOKEN }}
        run: |
          npm install -g \
            "git+https://x-access-token:${STLC_TOKEN}@github.com/karimsamir897/stlc-typescript.git" \
            "git+https://x-access-token:${STLC_TOKEN}@github.com/karimsamir897/stlc-mcp.git"
          npm install -g \
            "git+https://x-access-token:${STLC_TOKEN}@github.com/karimsamir897/stlc.git"

      - name: Verify stlc
        run: stlc version

      - name: Build SDK (direct to main if new repo, else branch + PR)
        env:
          STLC_TOKEN: ${{ secrets.STLC_TOKEN }}
          GH_TOKEN: ${{ secrets.STLC_TOKEN }}
        run: |
          SDK_REPO="karimsamir897/leadsnap-typescript-staging"

          # Helper: find the SDK clone holding the freshly generated gen-head.
          find_gen_head_clone() {
            find "$PWD" -name .git -exec sh -c \
              'git -C "$(dirname "$1")" show-ref --verify --quiet refs/stainless/gen-head && dirname "$1"' \
              _ {} \; 2>/dev/null | head -1
          }

          # --- New/empty repo: bootstrap straight to main (no PR) ---
          if [ -z "$(git ls-remote "https://github.com/${SDK_REPO}.git" refs/heads/main 2>/dev/null)" ]; then
            echo "Staging repo has no main — bootstrapping directly to main."
            stlc build --branch main --push
            exit 0
          fi

          # --- Populated repo: build to a fresh branch and open a PR ---
          BRANCH="stlc/sdk-${GITHUB_SHA:0:7}"
          echo "Building to preview branch: $BRANCH"
          set +e
          out=$(stlc build --branch "$BRANCH" --trunk-branch main --push 2>&1)
          code=$?
          printf '%s\n' "$out"
          set -e

          if [ "$code" -ne 0 ]; then
            # No custom code → if stlc refuses to overwrite the branch (it can't
            # recognize prior output in stateless CI), force the branch to the
            # freshly built+linted gen-head. Its parent is main, so the PR diff
            # stays clean. Any other failure is a real error.
            if printf '%s\n' "$out" | grep -q "Refusing to overwrite origin/"; then
              echo "Alignment guard hit — force-pushing gen-head to $BRANCH."
              clone="$(find_gen_head_clone)"
              if [ -z "$clone" ]; then echo "ERROR: no gen-head clone found"; exit 1; fi
              git -C "$clone" update-ref "refs/heads/$BRANCH" refs/stainless/gen-head
              git -C "$clone" push --force origin "refs/heads/$BRANCH:refs/heads/$BRANCH"
            else
              echo "Build failed for a reason other than the alignment guard — failing."
              exit "$code"
            fi
          fi

          # Open the PR (or note the existing one — a re-run of the same commit
          # reuses the same branch, so the open PR just gets the new commits).
          existing="$(gh pr list -R "$SDK_REPO" --head "$BRANCH" --base main --state open --json number --jq '.[0].number')"
          if [ -n "$existing" ]; then
            echo "PR #$existing already open for $BRANCH — updated by the push."
          else
            gh pr create -R "$SDK_REPO" --base main --head "$BRANCH" \
              --title "SDK update from api-spec@${GITHUB_SHA:0:7}" \
              --body "Automated SDK regeneration by stlc-build from api-spec@${GITHUB_SHA}."
          fi