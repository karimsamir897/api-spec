                            example: 28.174798245111
                          lng:
                            type: number
                            description: Longitude of the point.
                            example: -81.429216072674
                        required:
                          - lat
                          - lng
                    name:
                      type: string
                      description: Schedule name.
                      example: Weekly Roofing Check
                    place_id:
                      type: integer
                      description: The heatmap place ID.
                      example: 2795512
                    keywords:
                      type: array
                      description: Keywords to search.
                      example:
                        - Plumbing
                        - general contractor
                        - electrician
                        - hvac
                      items:
                        type: string
                    location_id:
                      type: integer
                      description: optional Location ID to associate the schedule with.
                      example: 20
                    lead_source_id:
                      type: integer
                      description: optional Lead source / company ID.
                      example: 3
                    lat:
                      type: number
                      description: optional Grid center latitude (informational).
                      example: 28.301844298972
                    lng:
                      type: number
                      description: optional Grid center longitude (informational).
                      example: -81.485368416424
                  required:
                    - grid_points
                    - name
                    - place_id
                    - keywords
                schedule_config:
                  type: object
                  description: Recurrence settings for the schedule.
                  example:
                    repeat_type: custom-month
                    repeat_every: 5
                    schedule_hour_minute: 05:00
                    timezone: +02:00
                  properties:
                    repeat_type:
                      type: string
                      description: >-
                        Recurrence pattern. Each value has different
                        requirements for `repeat_every` and `repeat_on`:<br><br>

                        - `week` — runs once a week on a fixed day. **Requires**
                        `repeat_on` (1=Monday … 7=Sunday). `repeat_every` is
                        ignored.<br>
                          _Example: run every Monday → `repeat_type: "week", repeat_on: 1`_<br><br>
                        - `month` — runs once a month on a fixed calendar day.
                        **Requires** `repeat_on` (1–31). `repeat_every` is
                        ignored.<br>
                          _Example: run on the 15th of every month → `repeat_type: "month", repeat_on: 15`_<br><br>
                        - `custom-day` — runs every N days. **Requires**
                        `repeat_every` (≥ 1). `repeat_on` is ignored.<br>
                          _Example: run every 3 days → `repeat_type: "custom-day", repeat_every: 3`_<br><br>
                        - `custom-week` — runs every N weeks. **Requires**
                        `repeat_every` (≥ 1). `repeat_on` is ignored.<br>
                          _Example: run every 2 weeks → `repeat_type: "custom-week", repeat_every: 2`_<br><br>
                        - `custom-month` — runs every N months. **Requires**
                        `repeat_every` (≥ 1). `repeat_on` is ignored.<br>
                          _Example: run every 6 months → `repeat_type: "custom-month", repeat_every: 6`_
                      example: custom-month
                    repeat_every:
                      type: integer
                      description: optional Required when `repeat_type` is `custom-day`,
                        `custom-week`, or `custom-month`. Specifies the interval
                        between runs (minimum 1). Ignored for `week` and
                        `month`.
                      example: 5
                    repeat_on:
                      type: integer
                      description: "optional Required when `repeat_type` is `week` or `month`. For
                        `week`: day of the week where 1=Monday and 7=Sunday. For
                        `month`: day of the calendar month (1–31). Ignored for
                        `custom-*` types."
                      example: 1
                    schedule_hour_minute:
                      type: string
                      description: optional Time of day to run the schedule in `HH:MM` 24-hour format.
                        Defaults to `12:00`.
                      example: 05:00
                    timezone:
                      type: string
                      description: optional Timezone for the schedule. Accepts an IANA timezone name
                        (e.g. `America/Chicago`) or a UTC offset (e.g.
                        `+02:00`). Defaults to `UTC`.
                      example: +02:00
                  required:
                    - repeat_type
              required:
                - heatmap_config
                - schedule_config
