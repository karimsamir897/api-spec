openapi: 3.0.3
info:
  title: API Documentation (Beta)
  description: API reference for the platform. We are currently starting with
    support for the Heatmaps API.
  version: 1.0.0
servers:
  - url: https://app.crmthrive.com
tags:
  - name: Heatmap Points
    description: >-
      
      Retrieve individual grid points within a heatmap, including their ranking
      data and organic search results.
  - name: Heatmap Schedules
    description: >-
      
      Create and manage automated heatmap schedules. Schedules run heatmaps on a
      recurring interval (weekly, monthly, or custom).
  - name: Heatmaps
    description: >-
      
      Create, retrieve, re-run and delete heatmaps.


      The core object of a heatmap is a **Google Place** — any business or
      location that has a Google Place ID can be used as the target of a
      heatmap, regardless of whether it is managed by the account. The place is
      always returned in the `place` object.


      If the targeted place is also a **location managed by the account** (i.e.
      connected via Google Business Profile), it is additionally exposed in the
      `location` object for clarity. This allows you to cross-reference heatmap
      results with your managed location data such as review stats, GMB
      insights, and citation subscriptions.


      To get the `place_id` of a managed location, use the [List
      locations](#tag/Heatmaps/GET/public/api/v1/heatmaps/locations) endpoint.
components:
  securitySchemes:
    default:
      type: http
      scheme: bearer
      description: Authenticate using a Sanctum bearer token. Use @unauthenticated on
        a route method to mark public endpoints.
security:
  - default: []
x-tagGroups:
  - name: Heatmaps
    tags:
      - Heatmaps
      - Heatmap Points
      - Heatmap Schedules
paths:
  /public/api/v1/heatmap/grids-points:
    post:
      summary: Generate grid points
      operationId: generateGridPoints
      description: >-
        Returns the computed grid point coordinates for a given configuration
        without creating a heatmap.

        Use this to preview a grid layout or to obtain the `points` array that
        can be passed to

        the Create Heatmap or Create Schedule endpoints.


        `grid_radius` is the spacing between points and is **always in meters**
        — e.g. `1000` = 1 km, `1609` ≈ 1 mile.

        When `polygon` is supplied the grid is clipped to that shape and only
        points inside it are returned.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                example:
                  count: 9
                  points:
                    - lat: 44.626765686401
                      lng: -88.170524385296
                    - lat: 44.658572959605
                      lng: -88.170524385296
                    - lat: 44.690380231407
                      lng: -88.170524385296
                    - lat: 44.626765686401
                      lng: -88.122418774951
                    - lat: 44.658572959605
                      lng: -88.122418774951
                    - lat: 44.690380231407
                      lng: -88.122418774951
                    - lat: 44.626765686401
                      lng: -88.074313164606
                    - lat: 44.658572959605
                      lng: -88.074313164606
                    - lat: 44.690380231407
                      lng: -88.074313164606
                properties:
                  count:
                    type: integer
                    example: 9
                  points:
                    type: array
                    example:
                      - lat: 44.626765686401
                        lng: -88.170524385296
                      - lat: 44.658572959605
                        lng: -88.170524385296
                      - lat: 44.690380231407
                        lng: -88.170524385296
                      - lat: 44.626765686401
                        lng: -88.122418774951
                      - lat: 44.658572959605
                        lng: -88.122418774951
                      - lat: 44.690380231407
                        lng: -88.122418774951
                      - lat: 44.626765686401
                        lng: -88.074313164606
                      - lat: 44.658572959605
                        lng: -88.074313164606
                      - lat: 44.690380231407
                        lng: -88.074313164606
                    items:
                      type: object
                      properties:
                        lat:
                          type: number
                          example: 44.626765686401
                        lng:
                          type: number
                          example: -88.170524385296
      tags:
        - Heatmap Points
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                lat:
                  type: number
                  description: Latitude of the grid center.
                  example: 44.670381143996
                lng:
                  type: number
                  description: Longitude of the grid center.
                  example: -88.122418774951
                grid_size:
                  type: integer
                  description: "Number of grid points per side (e.g. 3 = 3×3 grid). Maximum: `13`
                    (produces a 13×13 = 169-point grid)."
                  example: 3
                grid_radius:
                  type: number
                  description: Spacing between grid points, **in meters** (e.g. `1000` = 1 km,
                    `1609` ≈ 1 mile).
                  example: 3495
                polygon:
                  type: object
                  description: optional Custom polygon to clip the grid. Points outside the
                    polygon are excluded.
                  example: []
                  properties: {}
                  nullable: true
              required:
                - lat
                - lng
                - grid_size
                - grid_radius
  /public/api/v1/heatmaps/{heatmap_id}/points/{point_id}:
    get:
      summary: Get heatmap point
      operationId: getHeatmapPoint
      description: Returns details for a single grid point within a heatmap, including
        its coordinates, rank, and surrounding place rankings.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                example:
                  id: 5001
                  index: 0
                  lat: 44.626765686401
                  lng: -88.078293153604
                  rank: 3
                  places:
                    - id: 12
                      google_place_id: ChIJFzfDtmDzAogRn0zn9LJaP_A
                      name: Green City Roofing
                      address: 123 Main St, Green Bay, WI
                      review_count: 47
                      ave_review_rating: 4.8
                      ranking: 3
                properties:
                  id:
                    type: integer
                    example: 5001
                  index:
                    type: integer
                    example: 0
                  lat:
                    type: number
                    example: 44.626765686401
                  lng:
                    type: number
                    example: -88.078293153604
                  rank:
                    type: integer
                    example: 3
                  places:
                    type: array
                    example:
                      - id: 12
                        google_place_id: ChIJFzfDtmDzAogRn0zn9LJaP_A
                        name: Green City Roofing
                        address: 123 Main St, Green Bay, WI
                        review_count: 47
                        ave_review_rating: 4.8
                        ranking: 3
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 12
                        google_place_id:
                          type: string
                          example: ChIJFzfDtmDzAogRn0zn9LJaP_A
                        name:
                          type: string
                          example: Green City Roofing
                        address:
                          type: string
                          example: 123 Main St, Green Bay, WI
                        review_count:
                          type: integer
                          example: 47
                        ave_review_rating:
                          type: number
                          example: 4.8
                        ranking:
                          type: integer
                          example: 3
      tags:
        - Heatmap Points
    parameters:
      - in: path
        name: heatmap_id
        description: The ID of the heatmap.
        example: 1
        required: true
        schema:
          type: integer
      - in: path
        name: point_id
        description: The ID of the point.
        example: 1
        required: true
        schema:
          type: integer
      - in: path
        name: heatmap
        description: The heatmap ID.
        example: 1482
        required: true
        schema:
          type: integer
      - in: path
        name: point
        description: The grid point ID.
        example: 5001
        required: true
        schema:
          type: integer
  /public/api/v1/heatmap/schedules:
    get:
      summary: List schedules
      operationId: listSchedules
      description: >-
        Returns a paginated list of heatmap schedules for the account. Supports
        filtering, sorting, searching, and pagination.


        **Pagination** — all list responses include pagination fields at the
        root level alongside `data`:

        - `total` total matching records; `last_page` total pages; `per_page`
        results per page (default 25)

        - `next_page_url` URL of the next page (`null` on the last page)

        - `links` array of page link objects (`url`, `label`, `active`)


        **Date filters** — date params accept an object with `start_date` and/or
        `end_date` (YYYY-MM-DD):

        ```

        filter[created_at][start_date]=2026-01-01

        filter[created_at][end_date]=2026-04-30

        ```

        Named range aliases are also supported via
        `filter[created_at][date_range]`:

        `today`, `yesterday`, `last_7_days`, `last_30_days`, `this_month`,
        `last_month`, `this_year`, `last_year`, `all_time`
      parameters:
        - in: query
          name: filter[name]
          description: Filter by schedule name (partial match).
          example: Weekly Roofing
          required: false
          schema:
            type: string
            description: Filter by schedule name (partial match).
            example: Weekly Roofing
        - in: query
          name: filter[keyword]
          description: Filter by keyword in the schedule (exact match).
          example: roofing
          required: false
          schema:
            type: string
            description: Filter by keyword in the schedule (exact match).
            example: roofing
        - in: query
          name: filter[location_id]
          description: Filter by location ID.
          example: 20
          required: false
          schema:
            type: integer
            description: Filter by location ID.
            example: 20
        - in: query
          name: filter[place_id]
          description: Filter by place ID.
          example: 12
          required: false
          schema:
            type: integer
            description: Filter by place ID.
            example: 12
        - in: query
          name: filter[google_place_id]
          description: Filter by Google Place ID (exact).
          example: ChIJFzfDtmDzAogRn0zn9LJaP_A
          required: false
          schema:
            type: string
            description: Filter by Google Place ID (exact).
            example: ChIJFzfDtmDzAogRn0zn9LJaP_A
        - in: query
          name: filter[company_id]
          description: Filter by lead source / company ID.
          example: 3
          required: false
          schema:
            type: integer
            description: Filter by lead source / company ID.
            example: 3
        - in: query
          name: filter[status]
          description: "Filter by schedule status. Accepted: `active`, `paused`."
          example: active
          required: false
          schema:
            type: string
            description: "Filter by schedule status. Accepted: `active`, `paused`."
            example: active
        - in: query
          name: filter[repeat_type]
          description: "Filter by repeat type. Accepted: `week`, `month`, `custom-day`,
            `custom-week`, `custom-month`."
          example: week
          required: false
          schema:
            type: string
            description: "Filter by repeat type. Accepted: `week`, `month`, `custom-day`,
              `custom-week`, `custom-month`."
            example: week
        - in: query
          name: filter[repeat_every]
          description: Filter by repeat interval.
          example: 2
          required: false
          schema:
            type: integer
            description: Filter by repeat interval.
            example: 2
        - in: query
          name: filter[repeat_on]
          description: Filter by day of week (1–7) or day of month (1–31) depending on
            repeat_type.
          example: 1
          required: false
          schema:
            type: integer
            description: Filter by day of week (1–7) or day of month (1–31) depending on
              repeat_type.
            example: 1
        - in: query
          name: filter[created_at][start_date]
          description: Filter by creation date — range start (YYYY-MM-DD).
          example: 2026-01-01
          required: false
          schema:
            type: string
            description: Filter by creation date — range start (YYYY-MM-DD).
            example: 2026-01-01
        - in: query
          name: filter[created_at][end_date]
          description: Filter by creation date — range end (YYYY-MM-DD).
          example: 2026-04-30
          required: false
          schema:
            type: string
            description: Filter by creation date — range end (YYYY-MM-DD).
            example: 2026-04-30
        - in: query
          name: sort
          description: "Sort field. Prefix with `-` for descending. Accepted:
            `created_at`, `name`, `status`, `scheduled_at`,
            `last_schedule_ran_at`, `repeat_type`, `repeat_every`, `place_id`,
            `place.name`, `location_id`."
          example: -created_at
          required: false
          schema:
            type: string
            description: "Sort field. Prefix with `-` for descending. Accepted:
              `created_at`, `name`, `status`, `scheduled_at`,
              `last_schedule_ran_at`, `repeat_type`, `repeat_every`, `place_id`,
              `place.name`, `location_id`."
            example: -created_at
        - in: query
          name: search
          description: Full-text search across schedule name and place name.
          example: Green City
          required: false
          schema:
            type: string
            description: Full-text search across schedule name and place name.
            example: Green City
        - in: query
          name: per_page
          description: Number of results per page (default 25).
          example: 25
          required: false
          schema:
            type: integer
            description: Number of results per page (default 25).
            example: 25
        - in: query
          name: page
          description: Page number.
          example: 1
          required: false
          schema:
            type: integer
            description: Page number.
            example: 1
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                example:
                  current_page: 1
                  data:
