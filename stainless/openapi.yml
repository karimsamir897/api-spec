  /public/api/v1/heatmaps:
    get:
      summary: List heatmaps
      operationId: listHeatmaps
      description: >-
        Returns a paginated list of heatmaps for the authenticated account.
        Supports filtering, sorting, searching, and pagination.


        **Pagination** — all list responses include pagination fields at the
        root level alongside `data`:

        - `total` total matching records; `last_page` total pages; `per_page`
        results per page (default 25)

        - `next_page_url` URL of the next page (`null` on the last page)

        - `links` array of page link objects (`url`, `label`, `active`)


        **Date filters** — `filter[created_at]` accepts an object with
        `start_date` and/or `end_date` (YYYY-MM-DD):

        ```

        filter[created_at][start_date]=2026-01-01

        filter[created_at][end_date]=2026-04-30

        ```

        Alternatively, pass a named range alias via `filter[created_at][date]`:

        `today`, `yesterday`, `this_week`, `last_week`, `last_7_days`,
        `last_30_days`, `last_90_days`,

        `this_month`, `last_month`, `this_quarter`, `last_quarter`, `this_year`,
        `year_to_date`, `last_year`, `all_time`
      parameters:
