openapi: 3.0.3
info:
  title: API Documentation (Beta)
  description: API reference for the platform. We are currently starting with
    support for the Heatmaps API.
  version: 1.0.0
servers:
  - url: https://app.crmthrive.com
tags:
  - name: Contacts
    description: >-
      
      Read-only access to CRM contacts. A contact is created for every lead
      (phone

      call, form submission, SMS, email), so this is the canonical people
      directory.
  - name: Form Submissions
    description: |-
      
      Read-only access to website form submissions.
  - name: Heatmap Points
    description: >-
      
      Retrieve individual grid points within a heatmap, including their ranking
      data and organic search results.
  - name: Heatmap Schedules
    description: >-
      
      Create and manage automated heatmap schedules. Schedules run heatmaps on a
      recurring interval (weekly, monthly, or custom).
  - name: Heatmaps
    description: >-
      
      Create, retrieve, re-run and delete heatmaps.


      The core object of a heatmap is a **Google Place** — any business or
      location that has a Google Place ID can be used as the target of a
      heatmap, regardless of whether it is managed by the account. The place is
      always returned in the `place` object.


      If the targeted place is also a **location managed by the account** (i.e.
      connected via Google Business Profile), it is additionally exposed in the
      `location` object for clarity. This allows you to cross-reference heatmap
      results with your managed location data such as review stats, GMB
      insights, and citation subscriptions.


      To get the `place_id` of a managed location, use the [List
      locations](#tag/Heatmaps/GET/public/api/v1/heatmaps/locations) endpoint.
  - name: Phone Calls
    description: |-
      
      Read-only access to phone calls across LeadSnap Phone System, CallRail and
      CallSling (the unified `calls` table).
components:
  securitySchemes:
    default:
      type: http
      scheme: bearer
      description: Authenticate using a Sanctum bearer token. Use @unauthenticated on
        a route method to mark public endpoints.
security:
  - default: []
x-tagGroups:
  - name: APIs
    tags:
      - Heatmaps
      - Heatmap Points
      - Heatmap Schedules
      - Contacts
      - Phone Calls
      - Form Submissions
paths:
  /public/api/v1/contacts:
    get:
      summary: List contacts
      operationId: listContacts
      description: >-
        Returns a paginated list of contacts for the authenticated account.
        Supports
        search, filtering, sorting and pagination.
        **Pagination** — fields are returned at the root level alongside `data`:
        `total`, `last_page`, `per_page`, `current_page`. A `meta.summary`
        object carries

        counts for the filtered set: `total`, `spam`, `by_source`,
        `by_last_activity`.
      parameters:
        - in: query
          name: search
          description: Search across first name, last name, email, phone.
          example: john
          required: false
          schema:
            type: string
            description: Search across first name, last name, email, phone.
            example: john
        - in: query
          name: company_id
          description: Filter by company (lead source) id.
          example: 3
          required: false
          schema:
            type: integer
            description: Filter by company (lead source) id.
            example: 3
        - in: query
          name: client
          description: Filter by client (lead group) ids — contacts whose company belongs
            to one of these groups.
          example:
            - 5
          required: false
          schema:
            type: array
            description: Filter by client (lead group) ids — contacts whose company belongs
              to one of these groups.
            example:
              - 5
            items:
              type: integer
        - in: query
          name: source
          description: "Filter by first-touch source. Values: form_submission, phone, sms,
            import, manual, campaign, pipeline. Supports
            `is_any_of|phone,form_submission` and `is_none_of|...`."
          example: form_submission
          required: false
          schema:
            type: string
            description: "Filter by first-touch source. Values: form_submission, phone, sms,
              import, manual, campaign, pipeline. Supports
              `is_any_of|phone,form_submission` and `is_none_of|...`."
            example: form_submission
        - in: query
          name: last_activity_type
          description: 'Filter by the most-recent activity channel. Values: call, sms,
            email, voicemail, form_submission (the UI labels `call` as "Phone").
            Supports `is_any_of|call,sms`.'
          example: call
          required: false
          schema:
            type: string
            description: 'Filter by the most-recent activity channel. Values: call, sms,
              email, voicemail, form_submission (the UI labels `call` as
              "Phone"). Supports `is_any_of|call,sms`.'
            example: call
        - in: query
          name: status
          description: "Filter by status. Accepted: active, disabled."
          example: active
          required: false
          schema:
            type: string
            description: "Filter by status. Accepted: active, disabled."
            example: active
        - in: query
          name: is_spam
          description: Show spam contacts only when true; default hides spam.
          example: false
          required: false
          schema:
            type: boolean
            description: Show spam contacts only when true; default hides spam.
            example: false
        - in: query
          name: tags
          description: Filter by tag names. Supports `is_any_of` / `is_not` / empty
            (`null`) / not-empty (`notnull`).
          example:
            - VIP
          required: false
          schema:
            type: array
            description: Filter by tag names. Supports `is_any_of` / `is_not` / empty
              (`null`) / not-empty (`notnull`).
            example:
              - VIP
            items:
              type: string
        - in: query
          name: created_at_from
          description: date Created-at range start (YYYY-MM-DD).
          example: 2026-01-01
          required: false
          schema:
            type: string
            description: date Created-at range start (YYYY-MM-DD).
            example: 2026-01-01
        - in: query
          name: created_at_to
          description: date Created-at range end (YYYY-MM-DD, inclusive).
          example: 2026-06-30
          required: false
          schema:
            type: string
            description: date Created-at range end (YYYY-MM-DD, inclusive).
            example: 2026-06-30
        - in: query
          name: last_activity_from
          description: date Last-activity range start (YYYY-MM-DD).
          example: 2026-01-01
          required: false
          schema:
            type: string
            description: date Last-activity range start (YYYY-MM-DD).
            example: 2026-01-01
        - in: query
          name: last_activity_to
          description: date Last-activity range end (YYYY-MM-DD, inclusive).
          example: 2026-06-30
          required: false
          schema:
            type: string
            description: date Last-activity range end (YYYY-MM-DD, inclusive).
            example: 2026-06-30
        - in: query
          name: sort
          description: "Sort field; prefix with `-` for descending. Accepted: name, email,
            phone, company, created_at."
          example: -created_at
          required: false
          schema:
            type: string
            description: "Sort field; prefix with `-` for descending. Accepted: name, email,
              phone, company, created_at."
            example: -created_at
        - in: query
          name: per_page
          description: Results per page (default 25, max 100).
          example: 25
          required: false
          schema:
            type: integer
            description: Results per page (default 25, max 100).
            example: 25
        - in: query
          name: page
          description: Page number.
          example: 1
          required: false
          schema:
            type: integer
            description: Page number.
            example: 1
