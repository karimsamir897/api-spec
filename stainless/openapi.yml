  /public/api/v1/heatmaps/locations:
    get:
      summary: List locations
      operationId: listLocations
      description: >-
        Returns a paginated list of Google Business Profile locations for the
        authenticated account. Supports filtering, sorting, searching, and
        pagination.


        **Pagination** — all list responses include pagination fields at the
        root level alongside `data`:

        - `total` total matching records; `last_page` total pages; `per_page`
        results per page (default 25)

        - `next_page_url` URL of the next page (`null` on the last page)

        - `links` array of page link objects (`url`, `label`, `active`)
      parameters:
        - in: query
          name: filter[id]
          description: Filter by location ID.
          example: 20
          required: false
          schema:
            type: integer
            description: Filter by location ID.
            example: 20
        - in: query
          name: filter[location_name]
          description: Filter by location name (partial match).
          example: Green City
          required: false
          schema:
            type: string
            description: Filter by location name (partial match).
            example: Green City
        - in: query
          name: filter[address]
          description: Filter by address (partial match).
          example: 123 Main St
          required: false
          schema:
            type: string
            description: Filter by address (partial match).
            example: 123 Main St
        - in: query
          name: filter[city]
          description: Filter by city.
          example: Green Bay
          required: false
          schema:
            type: string
            description: Filter by city.
            example: Green Bay
        - in: query
          name: filter[state]
          description: Filter by state.
          example: WI
          required: false
