  /public/api/v1/heatmaps:
    get:
      summary: List heatmaps
      operationId: listHeatmaps
      description: >-
        Returns a paginated list of heatmaps for the authenticated account.
        Supports filtering, sorting, searching, and pagination.


        **Pagination** — all list responses include pagination fields at the
        root level alongside `data`:

        - `total` total matching records; `last_page` total pages; `per_page`
        results per page (default 25)

        - `next_page_url` URL of the next page (`null` on the last page)

        - `links` array of page link objects (`url`, `label`, `active`)


        **Date filters** — `filter[created_at]` accepts an object with
        `start_date` and/or `end_date` (YYYY-MM-DD):

        ```

        filter[created_at][start_date]=2026-01-01

        filter[created_at][end_date]=2026-04-30

        ```

        Alternatively, pass a named range alias via `filter[created_at][date]`:

        `today`, `yesterday`, `this_week`, `last_week`, `last_7_days`,
        `last_30_days`, `last_90_days`,

        `this_month`, `last_month`, `this_quarter`, `last_quarter`, `this_year`,
        `year_to_date`, `last_year`, `all_time`
      parameters:
        - in: query
          name: filter[status]
          description: "Filter by heatmap status. Accepted slugs: `queue`, `in_progress`,
            `completed`, `incomplete`, `failed`. Numeric values (0–4) are also
            accepted."
          example: completed
          required: false
          schema:
            type: string
            description: "Filter by heatmap status. Accepted slugs: `queue`, `in_progress`,
              `completed`, `incomplete`, `failed`. Numeric values (0–4) are also
              accepted."
            example: completed
        - in: query
          name: filter[keyword]
          description: Filter by keyword text (partial match).
          example: roofing
          required: false
          schema:
            type: string
            description: Filter by keyword text (partial match).
            example: roofing
        - in: query
          name: filter[location_id]
          description: Filter by location ID.
          example: 20
          required: false
          schema:
            type: integer
            description: Filter by location ID.
            example: 20
        - in: query
          name: filter[company_id]
          description: Filter by lead source / company ID.
          example: 3
          required: false
          schema:
            type: integer
            description: Filter by lead source / company ID.
            example: 3
        - in: query
          name: filter[business_name]
          description: Filter by business name (partial match).
          example: Green City
          required: false
          schema:
            type: string
            description: Filter by business name (partial match).
            example: Green City
        - in: query
          name: filter[google_place_id]
          description: Filter by Google Place ID (exact).
          example: ChIJFzfDtmDzAogRn0zn9LJaP_A
          required: false
          schema:
            type: string
            description: Filter by Google Place ID (exact).
            example: ChIJFzfDtmDzAogRn0zn9LJaP_A
        - in: query
          name: filter[tag]
          description: Filter by tag name (exact match).
          example: priority
          required: false
          schema:
            type: string
            description: Filter by tag name (exact match).
            example: priority
        - in: query
          name: filter[search_type]
          description: "Filter by search type. Accepted: `google_maps`, `local_pack`."
          example: google_maps
          required: false
          schema:
            type: string
            description: "Filter by search type. Accepted: `google_maps`, `local_pack`."
            example: google_maps
        - in: query
          name: filter[created_at][start_date]
          description: Filter by creation date — range start (YYYY-MM-DD).
          example: 2026-01-01
          required: false
          schema:
            type: string
            description: Filter by creation date — range start (YYYY-MM-DD).
            example: 2026-01-01
        - in: query
          name: filter[created_at][end_date]
          description: Filter by creation date — range end (YYYY-MM-DD).
          example: 2026-04-30
          required: false
          schema:
            type: string
            description: Filter by creation date — range end (YYYY-MM-DD).
            example: 2026-04-30
        - in: query
          name: filter[created_at][date]
          description: "Filter by a named date alias instead of a range. Accepted:
            `today`, `yesterday`, `this_week`, `last_week`, `last_7_days`,
            `last_30_days`, `last_90_days`, `this_month`, `last_month`,
            `this_quarter`, `last_quarter`, `this_year`, `year_to_date`,
            `last_year`, `all_time`."
          example: last_30_days
          required: false
          schema:
            type: string
            description: "Filter by a named date alias instead of a range. Accepted:
              `today`, `yesterday`, `this_week`, `last_week`, `last_7_days`,
              `last_30_days`, `last_90_days`, `this_month`, `last_month`,
              `this_quarter`, `last_quarter`, `this_year`, `year_to_date`,
              `last_year`, `all_time`."
            example: last_30_days
        - in: query
          name: sort
          description: "Sort field. Prefix with `-` for descending. Accepted:
            `created_at`, `average`, `top_3_points`, `top_3_position`,
            `top_3_percentage`, `review_count`, `review_rating`,
            `average_position`, `zoom_level`, `grid_size`, `market_share`,
