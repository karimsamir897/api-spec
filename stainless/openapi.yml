  /public/api/v1/heatmap/grid-points:
    post:
      summary: Generate grid points
      operationId: generateGridPoints
      description: >-
        Returns the computed grid point coordinates for a given configuration
        without creating a heatmap.

        Use this to preview a grid layout or to obtain the `points` array that
        can be passed to

        the Create Heatmap or Create Schedule endpoints.


        `grid_radius` is the spacing between points and is **always in meters**
        — e.g. `1000` = 1 km, `1609` ≈ 1 mile.

        When `polygon` is supplied the grid is clipped to that shape and only
        points inside it are returned.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                example:
                  count: 9
                  points:
                    - lat: 44.626765686401
                      lng: -88.170524385296
                    - lat: 44.658572959605
                      lng: -88.170524385296
                    - lat: 44.690380231407
                      lng: -88.170524385296
                    - lat: 44.626765686401
                      lng: -88.122418774951
                    - lat: 44.658572959605
                      lng: -88.122418774951
                    - lat: 44.690380231407
                      lng: -88.122418774951
                    - lat: 44.626765686401
                      lng: -88.074313164606
                    - lat: 44.658572959605
                      lng: -88.074313164606
                    - lat: 44.690380231407
                      lng: -88.074313164606
                properties:
                  count:
                    type: integer
                    example: 9
                  points:
                    type: array
                    example:
                      - lat: 44.626765686401
                        lng: -88.170524385296
                      - lat: 44.658572959605
                        lng: -88.170524385296
                      - lat: 44.690380231407
                        lng: -88.170524385296
                      - lat: 44.626765686401
                        lng: -88.122418774951
                      - lat: 44.658572959605
                        lng: -88.122418774951
                      - lat: 44.690380231407
                        lng: -88.122418774951
                      - lat: 44.626765686401
                        lng: -88.074313164606
                      - lat: 44.658572959605
                        lng: -88.074313164606
                      - lat: 44.690380231407
                        lng: -88.074313164606
                    items:
                      type: object
                      properties:
                        lat:
                          type: number
                          example: 44.626765686401
                        lng:
                          type: number
                          example: -88.170524385296
      tags:
        - Heatmap Points
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                lat:
                  type: number
                  description: Latitude of the grid center.
                  example: 44.670381143996
                lng:
                  type: number
                  description: Longitude of the grid center.
                  example: -88.122418774951
                grid_size:
                  type: integer
                  description: "Number of grid points per side (e.g. 3 = 3×3 grid). Maximum: `13`
                    (produces a 13×13 = 169-point grid)."
                  example: 3
                grid_radius:
                  type: number
                  description: Spacing between grid points, **in meters** (e.g. `1000` = 1 km,
                    `1609` ≈ 1 mile).
                  example: 3495
                polygon:
                  type: object
                  description: optional Custom polygon to clip the grid. Points outside the
                    polygon are excluded.
                  example: []
                  properties: {}
                  nullable: true
              required:
                - lat
                - lng
                - grid_size
                - grid_radius
