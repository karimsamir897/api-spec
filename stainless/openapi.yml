  /public/api/v1/contacts/{contactId}/timeline:
    get:
      summary: Contact timeline
      operationId: contactTimeline
      description: >-
        Returns a contact's activity timeline (form submissions, notes, tasks,
        documents,

        pipeline activity), newest first. **Cursor-paginated** — pass the
        response's

        `meta.next_cursor` back as `cursor` to fetch the next page.
      parameters:
        - in: query
          name: type
          description: "Filter to one activity type. Accepted: all, form_submission, note,
            document, task, pipeline. Default all."
          example: all
          required: false
          schema:
            type: string
            description: "Filter to one activity type. Accepted: all, form_submission, note,
              document, task, pipeline. Default all."
            example: all
        - in: query
          name: per_page
          description: Items per page (default 25, max 100).
          example: 25
          required: false
          schema:
            type: integer
            description: Items per page (default 25, max 100).
            example: 25
        - in: query
          name: cursor
          description: Opaque cursor from a previous response's `meta.next_cursor` (omit
            for the first page).
          example: eyJ0IjoiMjAyNi0wNi0yNCAxNDowNTowMCIsInMiOiJub3RlIiwiaSI6MX0=
          required: false
          schema:
            type: string
