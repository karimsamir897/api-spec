  /public/api/v1/phone-calls:
    get:
      summary: List phone calls
      operationId: listPhoneCalls
      description: >-
        Returns a paginated list of phone calls for the authenticated account.


        **Pagination** — root-level `total`, `last_page`, `per_page`,
        `current_page`.

        `meta.summary` carries counts for the filtered set: `total`,
        `qualified`,

        `not_qualified`, `voicemail`.
      parameters:
        - in: query
          name: search
          description: Search caller name / number, company name, or linked contact.
          example: "555"
          required: false
          schema:
            type: string
            description: Search caller name / number, company name, or linked contact.
            example: "555"
        - in: query
          name: company_id
          description: Filter by company (lead source) id.
          example: 3
          required: false
          schema:
            type: integer
            description: Filter by company (lead source) id.
            example: 3
        - in: query
          name: client
          description: Filter by client (lead group) ids.
          example:
            - 5
          required: false
          schema:
            type: array
            description: Filter by client (lead group) ids.
            example:
              - 5
            items:
              type: integer
        - in: query
          name: direction
          description: "Filter by direction: inbound or outbound. Supports
            `is_any_of|inbound,outbound`."
          example: inbound
          required: false
          schema:
            type: string
            description: "Filter by direction: inbound or outbound. Supports
              `is_any_of|inbound,outbound`."
            example: inbound
        - in: query
          name: voicemail
          description: Filter to voicemails (true) or non-voicemails (false).
          example: false
          required: false
          schema:
            type: boolean
            description: Filter to voicemails (true) or non-voicemails (false).
            example: false
        - in: query
          name: qualified
          description: Filter to qualified calls (those that generated a lead) when true.
          example: true
          required: false
          schema:
            type: boolean
            description: Filter to qualified calls (those that generated a lead) when true.
            example: true
        - in: query
          name: created_at_from
          description: date Call-date range start (YYYY-MM-DD).
