# yaml-language-server: $schema=https://app.stainless.com/config.schema.json

# The main edition for the config, see the [docs] for more information.
#
# [docs]: https://www.stainless.com/docs/reference/editions
edition: 2026-05-06

organization:
  # Name of your organization or company, used to determine the name of the client
  # and headings.
  name: thrive-mcp
  # Link to your API documentation.
  docs: ''
  # Contact email for bug reports, questions, and support requests.
  contact: ''

# `targets` define the output targets and their customization options, such as
# whether to emit the Node SDK and what its package name should be.
targets:
  typescript:
    # The edition for this target, see the [docs] for more information.
    #
    # [docs]: https://www.stainless.com/docs/reference/editions
    edition: typescript.2025-10-10
    package_name: leadsnap-mcp
    production_repo: karimsamir897/leadsnap-typescript-production
    publish:
      npm:
        auth_method: access-token
      release:
        branch: main
        prerelease: true
    options:
      mcp_server:
        package_name: thrive-mcp-mcp
        generate_cloudflare_worker: true
    staging_repo: karimsamir897/leadsnap-typescript-production

# `environments` are a map of the name of the environment (e.g. "sandbox",
# "production") to the corresponding url to use.
environments:
  Leadsnap: https://app.leadsnap.com
  Thrive: https://app.crmthrive.com
  Staging: https://staging.crmthrive.com
  Local: http://localhost:8009
# `resources` define the structure and organization for your API, such as how
# methods and models are grouped together and accessed. See the [configuration
# guide] for more information.
#
# [configuration guide]: https://www.stainless.com/docs/guides/configure#resources
resources:
  public:
    # Subresources define resources that are nested within another for more powerful
    # logical groupings, e.g. `cards.payments`.
    subresources:
      api:
        subresources:
          v1:
            subresources:
              heatmap:
                # Configure the methods defined in this resource. Each key in the object is the
                # name of the method and the value is either an endpoint (for example, `get /foo`)
                # or an object with more detail.
                #
                # [reference]: https://www.stainless.com/docs/reference/config#method
                methods:
                  generate_grid_points: post /public/api/v1/heatmap/grid-points
                  retrieve_heatmap_point: get /public/api/v1/heatmaps/{heatmap_id}/points/{point_id}
                  list_heatmaps: get /public/api/v1/heatmaps
                  create_heatmap: post /public/api/v1/heatmaps
                  list_locations: get /public/api/v1/heatmaps/locations
                  retrieve_heatmap: get /public/api/v1/heatmaps/{heatmap}
                  retrieve_heatmap_competitors: get /public/api/v1/heatmaps/{heatmap}/competitors
                subresources:
                  schedules:
                    methods:
                      list_schedules: get /public/api/v1/heatmap/schedules
                      create_schedule: post /public/api/v1/heatmap/schedules
                      retrieve_schedule: get /public/api/v1/heatmap/schedules/{schedule}
                      update_schedule: patch /public/api/v1/heatmap/schedules/{schedule_id}
                      pause_schedule: post /public/api/v1/heatmap/schedules/{schedule_id}/pause
                      resume_schedule: post /public/api/v1/heatmap/schedules/{schedule_id}/resume

settings:
  # All generated integration tests that hit the steady mock http server are marked
  # as skipped. Removing this setting or setting it to false enables tests, but
  # doing so may result in test failures due to bugs in the test server.
  #
  # [steady mock http server]: https://github.com/dgellow/steady
  disable_mock_tests: true
  license: Apache-2.0

# `client_settings` define settings for the API client, such as extra constructor
# arguments (used for authentication), retry behavior, idempotency, etc.
client_settings:
  opts:
    bearer_token:
      type: string
      nullable: false
      auth:
        security_scheme: default
      description: Authenticate using a Sanctum bearer token. Use @unauthenticated on a route method to mark public endpoints.
      read_env: THRIVE_MCP_BEARER_TOKEN

# `readme` is used to configure the code snippets that will be rendered in the
# README.md of various SDKs. In particular, you can change the `headline`
# snippet's endpoint and the arguments to call it with.
readme:
  example_requests:
    default:
      type: request
      endpoint: post /public/api/v1/heatmap/grid-points
      params:
        lat: REPLACe_ME
        lng: REPLACE_ME
        grid_size: REPLACE_ME
        grid_radius: REPLACE_ME
    headline:
      type: request
      endpoint: post /public/api/v1/heatmap/grid-points
      params:
        lat: REPLACE_ME
        lng: REPLACE_ME
        grid_size: REPLACE_ME
        grid_radius: REPLACE_ME
diagnostics:
  ignored:
    TypeScript/PublishingWithoutOIDC:
      - "#/targets/typescript/publish/npm/auth_method"
